project_root: ../..

model:
  pretrained: yolo11n.pt

dataset:
  data: datasets/base_coco80/data.yaml

training:
  epochs: 8
  imgsz: 480
  batch: 8
  device: cpu
  workers: 0
  patience: 5
  optimizer: AdamW
  lr0: 0.0001
  lrf: 0.1
  weight_decay: 0.0005
  freeze: 22
  classes: [0, 56, 60]
  warmup_epochs: 1
  close_mosaic: 3
  cos_lr: true
  amp: false
  seed: 42
  deterministic: true
  plots: true

output:
  model: artifacts/checkpoints/base_coco80.pt
  runs_dir: artifacts/runs
  run_name: base_coco80
  exist_ok: true
